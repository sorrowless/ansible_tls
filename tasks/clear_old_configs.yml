---
- name: TLS | Set list of domains
  ansible.builtin.set_fact:
    list_domains: "{{ (list_domains | default([])) + (['/root/.acme.sh.' + tls.acme_domains[0]] if tls.acme_domains else []) }}"
    list_delete_subdirectories: "{{ (list_delete_subdirectories | default([])) + (['/root/.acme.sh.' + tls.acme_domains[0] + '/' + tls.acme_domains[0] + '_ecc'] if tls.acme_domains and tls.keylength in ['2048','3072','4096'] else (['/root/.acme.sh.' + tls.acme_domains[0] + '/' + tls.acme_domains[0]] if tls.acme_domains else [])) }}"
  loop: "{{ tls_data }}"
  loop_control:
    loop_var: tls

- name: TLS | Find installed domains
  find:
    paths: "/root"
    patterns: ".acme.sh*"
    hidden: True
    file_type: "directory"
  register: list_domain_directories

- name: TLS | Select name of installed domains
  ansible.builtin.set_fact:
    list_installed_domains: "{{ (list_installed_domains | default([])) + [item.path] }}"
  with_items: "{{ list_domain_directories.files }}"

- name: TLS | show list of existing domains
  ansible.builtin.debug:
    var: list_installed_domains | default([])

- name: TLS | show list of domains to install
  ansible.builtin.debug:
    var: list_domains

- name: TLS | show list of domains to deletion
  ansible.builtin.debug:
    var: list_installed_domains | default([]) | difference(list_domains)

- name: TLS | Delete old configs
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items: "{{ list_installed_domains | default([]) | difference(list_domains) }}"

- name: TLS | Delete old subdirectories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items: "{{ list_delete_subdirectories }}"

- name: TLS | Delete old crontab entries
  become: true
  become_user: root
  ansible.builtin.cron:
    name: "TLS update from config directory - {{ item }}"
    state: "absent"
  with_items: "{{ list_installed_domains | default([]) | difference(list_domains) }}"
